# GitLab CI: 自动同步到 GitHub
#
# 需要在 GitLab Settings > CI/CD > Variables 中配置：
#   GITHUB_USER     - GitHub 用户名
#   GITHUB_TOKEN    - GitHub Personal Access Token (masked + protected)
#
sync_to_github:
  image: alpine:latest
  only:
    - master
  before_script:
    - apk add --no-cache git curl
    - git config --global user.email "bot@zstack.io"
    - git config --global user.name "GitLab Bot"
    - git clone --bare . /repo.git
  script:
    - >
      cd /repo.git &&
      git push --mirror https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/HeyMax/zstack-ai-assistant.git
  when: always
